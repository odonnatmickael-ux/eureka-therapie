// ── Utilitaires Streak 21 jours ────────────────────────────────────
function getToday() { return new Date().toISOString().slice(0, 10); }

function loadStreak() {
  try {
    const raw = localStorage.getItem('eureka_streak');
    if (!raw) return { lastDate: null, streak: 0 };
    return JSON.parse(raw);
  } catch { return { lastDate: null, streak: 0 }; }
}

function saveStreak(data) {
  try { localStorage.setItem('eureka_streak', JSON.stringify(data)); } catch {}
}

function computeNewStreak() {
  const today = getToday();
  const current = loadStreak();
  const { lastDate, streak } = current;
  if (!lastDate) { const s = { lastDate: today, streak: 1 }; saveStreak(s); return s; }
  if (lastDate === today) return current;
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  const yestStr = yest.toISOString().slice(0, 10);
  const newStreak = lastDate === yestStr ? Math.min(streak + 1, 21) : 1;
  const s = { lastDate: today, streak: newStreak };
  saveStreak(s); return s;
}

function scoreVAKOG(answers) {
  const counts = { V:0, A:0, K:0, O:0, G:0, R:0 };
  answers.forEach(v => { if(v && counts[v]!==undefined) counts[v]++; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  return { dominant: sorted[0][0], scores: counts, sorted };
}

// COMPOSANT : STREAK BANNER 21 JOURS
// ══════════════════════════════════════════════════════════════════
function StreakBanner({ streak }) {
  const pct = Math.min(Math.round((streak / 21) * 100), 100);
  const isDone = streak >= 21;

  const msg = streak === 0
    ? "Générez votre première séance pour commencer"
    : streak === 1 ? "Excellent début ! Revenez demain pour maintenir votre progression ✨"
    : streak < 7  ? `🔥 Vous êtes à ${streak} jours consécutifs — vous êtes lancé(e) !`
    : streak < 14 ? `🔥 ${streak} jours — votre cerveau se reconfigure profondément !`
    : streak < 21 ? `🔥 ${streak} jours — vous approchez de la transformation complète !`
    : "";

  if (isDone) return (
    <div style={{ background:`linear-gradient(135deg,rgba(184,149,90,.2),rgba(42,138,143,.2))`,
      borderRadius:"16px", padding:"1.25rem 1.5rem", border:`1.5px solid ${C.gold}`,
      marginBottom:"1.5rem", textAlign:"center", animation:"fadeUp .5s ease" }}>
      <p style={{ fontSize:"28px", marginBottom:"0.5rem" }}>🎉</p>
      <p style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:"20px", color:C.gold, fontWeight:"400" }}>
        Bravo, vous avez complété les 21 jours consécutifs !
      </p>
      <p style={{ fontSize:"12px", color:C.muted, marginTop:"0.5rem", lineHeight:"1.6" }}>
        La transformation est intégrée. Continuez à pratiquer pour maintenir les bénéfices.
      </p>
    </div>
  );

  return (
    <div style={{ background:C.card, borderRadius:"16px", padding:"1rem 1.25rem",
      border:`1px solid ${C.border}`, marginBottom:"1.25rem", animation:"fadeUp .5s ease" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.6rem" }}>
        <p style={{ fontSize:"13px", color:C.cream, fontFamily:"'Raleway',sans-serif", flex:1, paddingRight:"1rem", lineHeight:"1.5" }}>
          {msg}
        </p>
        <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"22px", color:C.gold, flexShrink:0, whiteSpace:"nowrap" }}>
          Jour {streak} <span style={{ fontSize:"14px", color:C.muted }}>/ 21</span>

      </div>
      <div style={{ height:"8px", background:C.border, borderRadius:"4px", overflow:"hidden" }}>

          background:`linear-gradient(90deg,${C.teal},${C.gold})`, transition:"width .6s ease" }} />
      </div>
    </div>
  );
}

// COMPOSANT : RAPPELS QUOTIDIENS
// ══════════════════════════════════════════════════════════════════
function ReminderPanel() {
  const [permStatus, setPermStatus] = useState(
    typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
  );
  const [reminderTime, setReminderTime] = useState(() => {
    try { return localStorage.getItem('eureka_reminder_time') || '20:00'; } catch { return '20:00'; }
  });
  const [saved, setSaved] = useState(false);
  const [showFallback] = useState(() => {
    const { lastDate } = loadStreak();
    return lastDate !== getToday();
  });

  const requestPermission = async () => {
    if (typeof Notification === 'undefined') return;
    const p = await Notification.requestPermission();
    setPermStatus(p);
    if (p === 'granted') {
      new Notification("EUREKA Sophrologie 🌿", {
        body: "Prenez 5 minutes pour votre séance aujourd'hui 🌿",
        icon: "/favicon.ico"
      });
    }
  };

  const saveTime = () => {
    try { localStorage.setItem('eureka_reminder_time', reminderTime); } catch {}
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div style={{ background:C.card, borderRadius:"16px", padding:"1.25rem 1.5rem",
      border:`1px solid ${C.border}`, marginBottom:"1.5rem" }}>
      <h3 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"18px", color:C.cream,
        fontWeight:"400", marginBottom:"1rem" }}>🔔 Rappels quotidiens</h3>

      {showFallback && (
        <div style={{ background:"rgba(184,149,90,.1)", borderRadius:"10px",
          padding:"0.75rem 1rem", border:`1px solid ${C.gold}`, marginBottom:"1rem" }}>
          <p style={{ fontSize:"13px", color:C.goldLight, lineHeight:"1.6" }}>
            🌿 N'oubliez pas votre séance aujourd'hui
          </p>
        </div>
      )}

      <div style={{ display:"flex", gap:"0.75rem", alignItems:"center", marginBottom:"1rem", flexWrap:"wrap" }}>
        <label style={{ fontSize:"12px", color:C.muted, fontFamily:"'Raleway',sans-serif" }}>Heure préférée :</label>
        <input type="time" value={reminderTime} onChange={e => setReminderTime(e.target.value)}
          style={{ padding:"6px 10px", background:C.panel, border:`1px solid ${C.border}`,
            borderRadius:"8px", color:C.cream, fontSize:"13px", fontFamily:"'Raleway',sans-serif" }} />
        <button onClick={saveTime}
          style={{ padding:"6px 14px", background:C.tealDark, border:"none", borderRadius:"8px",
            color:C.cream, fontSize:"12px", cursor:"pointer", fontFamily:"'Raleway',sans-serif" }}>
          {saved ? "✓ Enregistré" : "Enregistrer"}
        </button>
      </div>

      {permStatus === 'unsupported'
        ? <p style={{ fontSize:"12px", color:C.muted }}>Notifications non disponibles sur ce navigateur.</p>
        : permStatus === 'granted'
          ? <p style={{ fontSize:"12px", color:"#4ade80" }}>✓ Notifications activées — rappel à {reminderTime}</p>
          : permStatus === 'denied'
            ? <p style={{ fontSize:"12px", color:C.muted }}>Notifications bloquées. Autorisez-les dans les paramètres de votre navigateur.</p>
            : (
              <button onClick={requestPermission}
                style={{ width:"100%", padding:"0.75rem",
                  background:`linear-gradient(135deg,${C.teal},${C.tealDark})`,
                  border:"none", borderRadius:"10px", color:C.cream, fontSize:"13px",
                  cursor:"pointer", fontFamily:"'Raleway',sans-serif", letterSpacing:"1px" }}>
                🔔 Activer les rappels
              </button>
            )
      }
    </div>
  );
}

      // APPEL 2 : Les 3 scenes UNE SEULE FOIS en detail
      setLoadMsg("Generation des 3 scenes...");
      const scenes = await gpt(sysPrompt,
        info + "\n\nGenere UNIQUEMENT les 3 scenes therapeutiques - UNE SEULE FOIS - ZERO TITRE - commencer directement.\n\n" +
        "VERBES CANAL - ne jamais repeter le meme verbe plus de 2 fois par scene:\n" +

        "Scene 1 (MAXIMUM 220 mots au total - compter chaque mot - s arreter strictement a 220 mots): Faire voir/ressentir le probleme '" + problem + "' exagere selon canal " + vakog + ". Puis effacement complet. Son emprise s est evaporee. [PAUSE_5s] entre moments cles.\n\n" +
        "Scene 2 (MAXIMUM 220 mots au total - compter chaque mot - s arreter strictement a 220 mots): Voir " + prenom + " EN ACTION pour '" + objectif + "'. Actions concretes. [PAUSE_5s] entre moments.\n\n" +
        "Scene 3 (MAXIMUM 220 mots au total - compter chaque mot - s arreter strictement a 220 mots): " + prenom + " EST DEJA la nouvelle personne. Vie transformee en detail. [PAUSE_5s] entre moments.\n\n" +
        "Terminer par: La transformation est REELLE... elle est PERMANENTE... elle est MAINTENANT... [PAUSE_5s]", 3000);

      // JAVASCRIPT : Repeter les 3 scenes 7 fois exactement
      const annonces = [
        "Je vous invite maintenant a commencer ce travail de transformation, " + prenom + "... installez-vous encore plus profondement...",
        "Nous recommençons une deuxième fois...",
        "Une troisième fois...",
        "Une quatrième fois...",
        "Une cinquième fois...",
        "Une sixième fois...",
        "Une dernière fois... pour sceller cette transformation dans les profondeurs de votre être..."
      ];
      let cycles = "";
      for (let i = 0; i < 7; i++) {
        cycles += "\n\n" + annonces[i] + "\n\n" + scenes;
      }

      // APPEL 3 : Cloture spirituelle + Desophronisation
      setLoadMsg("Generation de la cloture...");
      const part3 = await gpt(sysPrompt,
        info + "\n\nGenere UNIQUEMENT la fin de seance - ZERO TITRE - commencer DIRECTEMENT:\n" +
        "1. Je cultive l amour... je cultive la verite... je cultive la paix... je fais toujours de mon mieux maintenant...\n" +
        "2. Affirmations " + beliefSystem + "\n" +
        "3. [PAUSE_15s]\n" +
        "4. Desophronisation douce: revenir... membres bougent... etirement... yeux s ouvrent... cloture chaleureuse avec " + prenom, 1500);

      // Assembler et nettoyer les titres residuels
      const raw = part1 + cycles + "\n\n" + part3;
      const clean = raw
        .replace(/\[VOIX[^\]]*\]/gi, "")
        .replace(/^#+\s.*$/gm, "")
        .replace(/\*\*[^*]+\*\*/g, "")
        .replace(/SCENE\s*\d[^\n]*/gi, "")
        .replace(/CYCLE\s*\d[^\n]*/gi, "")
        .replace(/Phase\s*\d[^\n]*/gi, "")
        .trim();

      setScript(clean);

      // AUDIO
      setLoadMsg("Generation audio en cours...");
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const sr = actx.sampleRate;
        const bufs = [];
        const sil = (s) => actx.createBuffer(1, Math.floor(sr * s), sr);
        const tts = async (txt) => {
          if (!txt.trim()) return null;
          const r = await fetch("/api/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text: txt.replace(/\[PAUSE_\d+s\]/gi, "").trim().substring(0, 4800),
              voiceId: selectedVoice
            })
          });
          if (!r.ok) return null;
          return await actx.decodeAudioData(await r.arrayBuffer());
        };
        const pat = /\[PAUSE_(\d+)s\]/gi;
        const parts = [];
        let li = 0, mx;
        while ((mx = pat.exec(clean)) !== null) {
          const t = clean.slice(li, mx.index).trim();
          if (t) parts.push({ type: "t", c: t });
          parts.push({ type: "s", sec: parseInt(mx[1]) });
          li = mx.index + mx[0].length;
        }
        const rem = clean.slice(li).trim();
        if (rem) parts.push({ type: "t", c: rem });
        const fp = [];
        for (const p of parts) {
          if (p.type === "s") { fp.push(p); continue; }
          let tx = p.c;
          while (tx.length > 4800) {
            let cut = tx.lastIndexOf("... ", 4800);
            if (cut < 500) cut = tx.lastIndexOf(". ", 4800);
            if (cut < 500) cut = 4800;
            fp.push({ type: "t", c: tx.substring(0, cut + 3) });
            tx = tx.substring(cut + 3).trim();
          }
          if (tx) fp.push({ type: "t", c: tx });
        }
        const tc = fp.filter(p => p.type === "t").length;
        let done = 0;
        for (const p of fp) {
          if (p.type === "s") { bufs.push(sil(p.sec)); }
          else {
            done++;
            setLoadMsg("Audio " + done + " / " + tc + " segments...");
            const b = await tts(p.c);
            if (b) bufs.push(b);
          }
        }
        if (bufs.length > 0) {
          const tot = bufs.reduce((s, b) => s + b.length, 0);
          const comb = actx.createBuffer(1, tot, sr);
          const ch = comb.getChannelData(0);
          let off = 0;
          for (const b of bufs) { ch.set(b.getChannelData(0), off); off += b.length; }
          setAudioUrl(URL.createObjectURL(bufferToWav(comb, sr)));
        } else { setError("Audio non genere - verifiez ElevenLabs."); }
      } catch (ae) { setError("Erreur audio: " + ae.message); }

      // EMAIL
      setLoadMsg("Envoi email...");
      try {
        emailjs.init(CONFIG.EJS_PUBLIC_KEY);
        await emailjs.send(CONFIG.EJS_SERVICE_ID, CONFIG.EJS_TEMPLATE_ID, {

        });

      // STREAK 21 JOURS

function bufferToWav(buffer, sampleRate) {
  const numCh = 1, bps = 16;
  const byteRate = sampleRate * numCh * bps / 8;
  const blockAlign = numCh * bps / 8;
  const dataLen = buffer.length * blockAlign;
  const ab = new ArrayBuffer(44 + dataLen);
  const v = new DataView(ab);
  const ws = (o, s) => { for (let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+dataLen,true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,numCh,true);
  v.setUint32(24,sampleRate,true); v.setUint32(28,byteRate,true);
  v.setUint16(32,blockAlign,true); v.setUint16(34,bps,true); ws(36,'data');
  v.setUint32(40,dataLen,true);
  const d = buffer.getChannelData(0); let o = 44;
  for (let i=0;i<d.length;i++,o+=2) { const s=Math.max(-1,Math.min(1,d[i])); v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true); }
  return new Blob([ab],{type:'audio/wav'});
}
